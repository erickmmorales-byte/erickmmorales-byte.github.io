<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% seo %}
</head>
<body>

  <!-- Dark mode toggle -->
  <button class="dark-toggle" aria-label="Toggle dark mode">DARK</button>

  <!-- Hamburger button -->
  <button class="menu-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="side-panel">
    <span class="menu-toggle__bar"></span>
    <span class="menu-toggle__bar"></span>
    <span class="menu-toggle__bar"></span>
  </button>

  <!-- Side panel -->
  <nav id="side-panel" class="side-panel" aria-label="Site navigation" aria-hidden="true">
    <p class="side-panel__label">Navigation</p>
    <ul class="side-panel__nav">
      <li><a href="{{ '/' | relative_url }}">Posts</a></li>
      <li><a href="{{ '/about/' | relative_url }}">About</a></li>
    </ul>
  </nav>

  <!-- Backdrop -->
  <div class="backdrop" aria-hidden="true"></div>

  <!-- Page content -->
  {{ content }}

  <!-- Post modal -->
  <div class="post-modal" aria-hidden="true">
    <div class="post-modal__backdrop"></div>
    <div class="post-modal__container" role="dialog" aria-modal="true" aria-label="Post">
      <button class="post-modal__close" aria-label="Close">&times;</button>
      <div class="post-modal__scroll">
        <time class="post-modal__date"></time>
        <h2 class="post-modal__title"></h2>
        <div class="post-modal__body"></div>
      </div>
    </div>
  </div>

  <!-- Image lightbox -->
  <div class="img-lightbox" aria-hidden="true">
    <div class="img-lightbox__backdrop"></div>
    <div class="img-lightbox__container" role="dialog" aria-modal="true" aria-label="Image">
      <button class="img-lightbox__close" aria-label="Close">&times;</button>
      <div class="img-lightbox__layout img-lightbox__layout--left">
        <div class="img-lightbox__caption-panel">
          <p class="img-lightbox__caption"></p>
        </div>
        <div class="img-lightbox__image-panel">
          <img class="img-lightbox__img" src="" alt="">
        </div>
      </div>
    </div>
  </div>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
